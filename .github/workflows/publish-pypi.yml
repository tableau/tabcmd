name: Publish to PyPi

on:
  workflow_dispatch:
    inputs:
      is_draft:
        description: 'Test PyPi'
        required: true
        type: boolean
  release:
    types: [published]

jobs:
  build-n-publish:
    name: Build dist files for PyPi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v7
        with:
          python-version: 3.12
      - name: Build dist files
        run: |
          python --version
          python -m pip install --upgrade pip
          python -m pip install --upgrade build
          pip install .[versioning]
          doit version
          pip install .
          python -m build
          
      - name: Publish distribution 📦 to Test PyPI
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.is_draft == true }}
        uses: pypa/gh-action-pypi-publish@release/v1  # license BSD-2
        with:
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          repository_url: https://test.pypi.org/legacy/
      - name: Publish distribution 📦 to PyPI
        if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.is_draft != true) }}
        uses: pypa/gh-action-pypi-publish@release/v1  # license BSD-2
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
